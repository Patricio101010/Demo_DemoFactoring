<script>
    var loadFile = function (event) {
        var output_ = document.getElementById('imgPerfilsidebar');
        var output = document.getElementById('imgPerfil');
        const file = document.querySelector('#file-input').files[0];
        getBase64(file);
        output_.src = URL.createObjectURL(event.target.files[0]);
        output.src = URL.createObjectURL(event.target.files[0]);
        output.onload = function () {
            URL.revokeObjectURL(output.src)
        }
        output_.onload = function () {
            URL.revokeObjectURL(output_.src)
        }
    };

    function getBase64(file) {
        var reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function () {
            GrabarImagen(reader.result);
            //console.log(reader.result);
        };
        reader.onerror = function (error) {
            //  console.log('Error: ', error);
        };
    };

    function GrabarImagen(imgbase64) {
        const http = new XMLHttpRequest();
        var formdata = new FormData();
        formdata.append("baseimage", imgbase64);
        $.ajax({
            url: "/Sistemas/UploadImg",
            type: "POST",
            data: formdata,
            processData: false,
            contentType: false
        });
    };


</script>

    <script type="text/javascript">
        $(document).ready(function () {
            $("#search").keyup(function () {

                var filter = $(this).val();
                $(`nav li:not(.nav-section)`).each(function (index, element) {
                    const item = $(element);

                    const parentListIsNested = item.closest('ul').hasClass('navview-menu');

                    if (item.text().match(new RegExp(filter, 'gi'))) {
                        item.fadeIn();
                        if (parentListIsNested) {
                            item.closest('ul').addClass('in');
                        }
                    } else {
                        item.fadeOut();
                        if (parentListIsNested) {
                            item.closest('ul').removeClass('in');
                        }
                    }
                });
            });
        })
    </script>
