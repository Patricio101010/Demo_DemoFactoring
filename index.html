<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dim-One · Acceso Premium</title>
  <link rel="shortcut icon" href="assets/images/icono.ico" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  
  <!-- MDI Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">

  <style>
    /* ═══════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }
    
    body {
      font-family: 'Inter', 'Poppins', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: #0a0a1a;
      position: relative;
    }

    /* ═══════════════════════════════════════════════
       PRELOADER PREMIUM — FULL SCREEN
    ═══════════════════════════════════════════════ */
    .loader-wrap {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    
    .loader-wrap.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(209, 14, 73, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Click hint */
    .click-hint {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      animation: pulseHint 2s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes pulseHint {
      0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.7; transform: translateX(-50%) scale(1.05); }
    }

    /* ── Partículas de fondo ── */
    .bg-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    
    .bg-particles span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(209, 14, 73, 0.35);
      border-radius: 50%;
      animation: particleFloat 8s ease-in-out infinite;
    }
    
    @keyframes particleFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100vh) scale(0); opacity: 0; }
    }

    /* ── Contenedor central del loader ── */
    .fusion-loader {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    /* ── SVG Logo Premium ── */
    .loader-container {
      position: relative;
      width: 22vh;
      max-width: 280px;
      height: auto;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: transform, filter;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.3)) 
              drop-shadow(0 0 20px rgba(209, 14, 73, 0.2));
      animation: globalPulse 6s cubic-bezier(0.25, 1, 0.5, 1) infinite;
      margin-bottom: 30px;
    }

    .loader-svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    /* Capas de animación del SVG */
    .neon-glow-red {
      fill: none;
      stroke: #ff2a61;
      stroke-width: 0.6px;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawContours 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      filter: drop-shadow(0 0 4px rgba(255, 42, 97, 0.6));
    }

    .brand-red {
      fill: #d10e49;
      opacity: 0;
      animation: fadeInSolid 6s cubic-bezier(0.33, 1, 0.68, 1) infinite;
    }

    .brand-white {
      fill: #ffffff;
      opacity: 0;
      animation: fadeInSolid 6s cubic-bezier(0.33, 1, 0.68, 1) infinite;
    }

    .shine-bar {
      will-change: transform;
      transform-origin: center;
      animation: doubleVolumetricShine 6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }

    /* Keyframes del SVG */
    @keyframes drawContours {
      0% { stroke-dashoffset: 1000; opacity: 1; }
      26% { stroke-dashoffset: 0; opacity: 1; }
      45%, 82% { stroke-dashoffset: 0; opacity: 0.15; }
      92%, 100% { stroke-dashoffset: -1000; opacity: 0; }
    }

    @keyframes fadeInSolid {
      0%, 15% { opacity: 0; }
      38%, 82% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }

    @keyframes doubleVolumetricShine {
      0%, 36% { transform: translate(-150px, -60px); opacity: 0; }
      39% { opacity: 1; }
      49% { transform: translate(220px, 80px); opacity: 0; }
      51% { transform: translate(-150px, -60px); opacity: 0; }
      55% { opacity: 0.6; }
      67%, 100% { transform: translate(220px, 80px); opacity: 0; }
    }

    @keyframes globalPulse {
      0% { transform: scale(0.98); filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3)) drop-shadow(0 0 10px rgba(209,14,73,0.1)); }
      42%, 65% { transform: scale(1.02); filter: drop-shadow(0 12px 32px rgba(0,0,0,0.35)) drop-shadow(0 0 25px rgba(209,14,73,0.3)); }
      85% { transform: scale(1); filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3)) drop-shadow(0 0 20px rgba(209,14,73,0.2)); opacity: 1; }
      94% { transform: scale(0.96); filter: blur(4px); opacity: 0; }
      100% { transform: scale(0.98); filter: blur(8px); opacity: 0; }
    }

    /* ── TEXTO DIMENSION — CAPAS CORREGIDAS ── */
    .txt-loading {
      text-align: center;
      margin-top: 10px;
      user-select: none;
    }

    .text-shine-wrapper {
      position: relative;
      display: inline-block;
      font-family: 'Dim', 'Segoe UI', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 0px;
      line-height: 1.2;
      white-space: nowrap;
    }

    /* Capa 1: Letras principales */
    .letters-loading {
      display: inline-block;
      position: relative;
      margin: 0 2px;
      color: transparent;
      -webkit-text-stroke-width: 1.2px;
      -webkit-text-stroke-color: rgba(210, 16, 71, 0.8);
      opacity: 0;
      animation: fadeInSolid 6s cubic-bezier(0.33, 1, 0.68, 1) infinite;
      z-index: 2;
    }

    .letters-loading::before {
      content: attr(data-text-preloader);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      color: #d21047;
      -webkit-text-stroke-width: 0;
      opacity: 0;
      animation: fillSync 6s cubic-bezier(0.33, 1, 0.68, 1) infinite;
    }

    @keyframes fillSync {
      0%, 15% { opacity: 0; }
      25% { opacity: 0.3; }
      38% { opacity: 1; }
      82% { opacity: 1; }
      92%, 100% { opacity: 0; }
    }

    /* Capa 2: Brillo suave continuo */
    .text-subtle-shine {
      position: absolute;
      letter-spacing: 2px;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 30%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0.25) 70%, rgba(255,255,255,0) 100%);
      background-size: 250% 100%;
      background-repeat: no-repeat;
      opacity: 0;
      animation: subtleShineWalk 6s ease-in-out infinite;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      z-index: 10;
    }

    @keyframes subtleShineWalk {
      0%, 15% { background-position: -200% 0; opacity: 0; }
      25% { opacity: 0.3; }
      38% { opacity: 0.9; background-position: -100% 0; }
      55% { background-position: 0% 0; opacity: 1; }
      75% { background-position: 100% 0; opacity: 0.8; }
      82% { background-position: 200% 0; opacity: 0.3; }
      92%, 100% { background-position: 200% 0; opacity: 0; }
    }

    /* Capa 3: Brillo intenso destello */
    .text-shine-effect {
      position: absolute;
      letter-spacing: 2px;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 30%, rgba(255,255,255,0.85) 50%, rgba(255,255,255,0.25) 70%, rgba(255,255,255,0) 100%);
      background-size: 200% 100%;
      background-repeat: no-repeat;
      opacity: 0;
      animation: textDoubleShine 6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      z-index: 11;
    }

    @keyframes textDoubleShine {
      0%, 36% { background-position: -200% 0; opacity: 0; }
      39% { opacity: 0.7; background-position: 0% 0; }
      49% { background-position: 200% 0; opacity: 0; }
      51% { background-position: -200% 0; opacity: 0; }
      55% { opacity: 0.5; background-position: -80% 0; }
      67%, 100% { background-position: 200% 0; opacity: 0; }
    }

    /* Wave stagger */
    .letters-loading:nth-child(1) { animation-delay: 0s; }
    .letters-loading:nth-child(2) { animation-delay: 0.04s; }
    .letters-loading:nth-child(3) { animation-delay: 0.08s; }
    .letters-loading:nth-child(4) { animation-delay: 0.12s; }
    .letters-loading:nth-child(5) { animation-delay: 0.16s; }
    .letters-loading:nth-child(6) { animation-delay: 0.20s; }
    .letters-loading:nth-child(7) { animation-delay: 0.24s; }
    .letters-loading:nth-child(8) { animation-delay: 0.28s; }
    .letters-loading:nth-child(9) { animation-delay: 0.32s; }

    /* Glow pulsante debajo */
    .text-glow-bloom {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 12px;
      background: radial-gradient(ellipse at center, rgba(209, 14, 73, 0.5) 0%, transparent 70%);
      filter: blur(8px);
      opacity: 0;
      animation: glowBloom 6s cubic-bezier(0.33, 1, 0.68, 1) infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes glowBloom {
      0%, 15% { opacity: 0; transform: translateX(-50%) scaleX(0.5); }
      38% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
      50% { opacity: 0.8; transform: translateX(-50%) scaleX(1.1); }
      82% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
      92%, 100% { opacity: 0; transform: translateX(-50%) scaleX(0.5); }
    }

    /* Caption */
    .loading-caption {
      color: #d10e49;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 20px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInSolid 6s cubic-bezier(0.33, 1, 0.68, 1) infinite;
    }

    /* Barra de progreso */
    .progress-track {
      width: 180px;
      height: 2px;
      background: rgba(209, 14, 73, 0.15);
      border-radius: 2px;
      margin-top: 24px;
      overflow: hidden;
      position: relative;
      opacity: 0;
      animation: fadeInSolid 6s cubic-bezier(0.33, 1, 0.68, 1) infinite;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #d10e49, #ff4d7a, #d10e49);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: progressFill 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 12px rgba(209, 14, 73, 0.5);
    }

    @keyframes progressFill {
      0%, 15% { width: 0%; opacity: 0; }
      20% { opacity: 1; }
      38% { width: 35%; }
      55% { width: 60%; }
      75% { width: 85%; }
      82% { width: 100%; opacity: 1; }
      92%, 100% { width: 100%; opacity: 0; }
    }

    /* Responsive loader */
    @media (max-width: 580px) {
      .loader-container { width: 180px; }
      .text-shine-wrapper { font-size: 1.8rem; letter-spacing: 2px; }
      .loading-caption { font-size: 0.7rem; }
      .progress-track { width: 140px; }
    }
        /* ═══════════════════════════════════════════════
       BACKGROUND SYSTEM
    ═══════════════════════════════════════════════ */
    .bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 85%;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), 
                  transform 8s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform, opacity;
    }

    .bg-image.active {
      opacity: 1;
      transform: scale(1.05);
      animation: kenBurns 20s ease-in-out infinite;
    }

    .bg-image.inactive {
      opacity: 0;
      transform: scale(1.15);
    }

    @keyframes kenBurns {
      0% { transform: scale(1.05) translate(0, 0); }
      50% { transform: scale(1.12) translate(-1%, -1%); }
      100% { transform: scale(1.05) translate(0, 0); }
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(15, 23, 42, 0.5) 0%,
        rgba(15, 23, 42, 0.2) 40%,
        rgba(15, 23, 42, 0.6) 100%
      );
      z-index: 1;
    }

    .particles-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: orbFloat 15s ease-in-out infinite;
      z-index: 1;
    }

    .orb-1 { width: 400px; height: 400px; background: #2152a3; top: -10%; left: -10%; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: #4CAF50; bottom: -5%; right: -5%; animation-delay: -5s; }
    .orb-3 { width: 250px; height: 250px; background: #f2d030; top: 50%; left: 50%; animation-delay: -10s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ═══════════════════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════════════════ */
    .main-content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .main-content.revealed {
      opacity: 1;
      transform: scale(1);
    }

    /* ═══════════════════════════════════════════════
       LOGIN CARD — GLASSMORPHISM
    ═══════════════════════════════════════════════ */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.88);
      -webkit-backdrop-filter: blur(24px);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 
                  0 0 0 1px rgba(255, 255, 255, 0.2),
                  0 0 40px rgba(33, 82, 163, 0.1);
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.1s ease;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
      background-size: 200% 200%;
      border-radius: 28px;
      z-index: -1;
      animation: shimmerBorder 3s linear infinite;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .login-card:hover::before { opacity: 1; }

    @keyframes shimmerBorder {
      0% { background-position: 200% 200%; }
      100% { background-position: -200% -200%; }
    }

    .country-line {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 4px;
      border-radius: 0 0 4px 4px;
      background: #2152a3;
      transition: background 0.5s ease, width 0.3s ease;
    }

    .login-card:hover .country-line { width: 100px; }

    /* Brand */
    .brand-section { text-align: center; margin-bottom: 1.5rem; }
    
    .brand-logo {
      width: 180px;
      height: auto;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1));
      transition: transform 0.3s ease;
    }
    
    .brand-logo:hover { transform: scale(1.05); }
    
    .brand-subtitle {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    /* Country Selector */
    .country-selector {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .country-btn {
      position: relative;
      width: 50px;
      height: 50px;
      border-radius: 45px;
      border: 3px solid transparent;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      cursor: pointer;
      padding: 0px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .country-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .country-btn[data-country="CL"]::after {
      box-shadow: 0 0 20px rgba(33, 82, 163, 0.3), inset 0 0 20px rgba(33, 82, 163, 0.1);
    }
    .country-btn[data-country="PE"]::after {
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.3), inset 0 0 20px rgba(76, 175, 80, 0.1);
    }
    .country-btn[data-country="CO"]::after {
      box-shadow: 0 0 20px rgba(242, 208, 48, 0.3), inset 0 0 20px rgba(242, 208, 48, 0.1);
    }

    .country-btn:hover { transform: translateY(-4px); }
    .country-btn:hover::after { opacity: 1; }

    .country-btn.active {
      border-color: currentColor;
      transform: translateY(-4px) scale(1.08);
      background: white;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .country-btn.active[data-country="CL"] { border-color: #2152a3; color: #2152a3; box-shadow: 0 8px 24px rgba(33, 82, 163, 0.2); }
    .country-btn.active[data-country="PE"] { border-color: #4CAF50; color: #4CAF50; box-shadow: 0 8px 24px rgba(76, 175, 80, 0.2); }
    .country-btn.active[data-country="CO"] { border-color: #f2d030; color: #f2d030; box-shadow: 0 8px 24px rgba(242, 208, 48, 0.2); }

    .country-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 12px;
      transition: filter 0.3s ease;
    }

    .country-btn:not(.active) img { filter: grayscale(100%) opacity(0.6); }
    .country-btn:hover:not(.active) img { filter: grayscale(50%) opacity(0.8); }

    .country-label {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      font-family: 'Outfit', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a1a2e;
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .country-btn.active .country-label {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: #6b7280;
      font-size: 0.75rem;
      font-weight: 500;
      font-family: 'Outfit', sans-serif;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);
    }

    /* Inputs */
    .input-group-custom {
      position: relative;
      margin-bottom: 1rem;
    }

    .input-group-custom .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 1.25rem;
      z-index: 2;
      transition: color 0.3s ease;
    }

    .input-group-custom input {
      width: 100%;
      height: 56px;
      padding: 0 3rem 0 52px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: #1a1a2e;
      background: rgba(255, 255, 255, 0.7);
      border: 2px solid rgba(0, 0, 0, 0.06);
      border-radius: 16px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    .input-group-custom input::placeholder { color: transparent; }
    
    .input-group-custom input:focus {
      background: white;
      border-color: #3b7bd4;
      box-shadow: 0 0 0 4px rgba(33, 82, 163, 0.15);
    }

    .input-group-custom input:focus + .input-icon,
    .input-group-custom input:not(:placeholder-shown) + .input-icon {
      color: #2152a3;
    }

    /* Floating label */
    .floating-label {
      position: absolute;
      left: 52px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.95rem;
      font-weight: 400;
      color: #9ca3af;
      pointer-events: none;
      transition: all 0.2s ease;
      background: transparent;
      padding: 0 4px;
    }

    .input-group-custom input:focus ~ .floating-label,
    .input-group-custom input:not(:placeholder-shown) ~ .floating-label {
      top: 0;
      transform: translateY(-50%) scale(0.8);
      background: white;
      color: #2152a3;
      font-weight: 600;
    }

    /* Password toggle */
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      padding: 4px;
      font-size: 1.1rem;
      transition: color 0.2s ease;
      z-index: 2;
    }

    .password-toggle:hover { color: #1a1a2e; }

    /* Error state */
    .input-group-custom.error input {
      border-color: #ef4444;
      animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    .input-group-custom.error .input-icon { color: #ef4444; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: white;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 0.5rem;
    }

    .btn-submit-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #2152a3 0%, #3b7bd4 100%);
      transition: all 0.5s ease;
    }

    .btn-submit:hover .btn-submit-bg { filter: brightness(1.1); }
    .btn-submit:active .btn-submit-bg { filter: brightness(0.95); }

    .btn-submit-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0);
      animation: rippleEffect 0.6s linear;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to { transform: scale(4); opacity: 0; }
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
      transform: rotate(30deg) translateX(-100%);
      transition: transform 0.6s ease;
    }

    .btn-submit:hover::after { transform: rotate(30deg) translateX(100%); }

    .btn-submit.loading .btn-submit-content { opacity: 0; }
    
    .spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .btn-submit.loading .spinner { opacity: 1; }
    
    .spinner-ring {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer-section {
      margin-top: 1.5rem;
      text-align: center;
      opacity: 0;
      animation: fadeInUp 0.6s ease 0.4s forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bank-logo {
      height: 32px;
      opacity: 0.6;
      transition: opacity 0.3s ease, filter 0.3s ease;
      filter: grayscale(30%);
    }

    .bank-logo:hover { opacity: 1; filter: grayscale(0%); }

    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.75rem;
      font-size: 0.7rem;
      color: #6b7280;
      font-weight: 500;
      font-family: 'Outfit', sans-serif;
    }

    .security-badge i {
      color: #4CAF50;
      font-size: 0.9rem;
    }

    /* Rotate message */
    .rotate-message {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }

    .rotate-message img {
      width: 200px;
      opacity: 0.8;
      animation: rotateDevice 2s ease-in-out infinite;
    }

    @keyframes rotateDevice {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }

    .rotate-message h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
    }

    .rotate-message p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
    }

    @media screen and (max-height: 450px) and (orientation: landscape) {
      .main-content { display: none; }
      .rotate-message { display: flex; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; border-radius: 24px; }
      .brand-logo { width: 150px; }
      .country-btn { width: 48px; height: 48px; }
      .input-group-custom input { height: 52px; }
      .btn-submit { height: 52px; }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .bg-image.active { animation: none; }
    }

    .country-btn:focus-visible,
    .btn-submit:focus-visible,
    input:focus-visible {
      outline: 3px solid #3b7bd4;
      outline-offset: 2px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }
  </style>

    // Generar partículas dinámicas
    (function() {
      const container = document.querySelector('.loader-container');
      if (container) {
        container.style.transform = 'translateZ(0)';
        container.style.backfaceVisibility = 'hidden';
      }

      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('span');
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (4 + Math.random() * 6) + 's';
        const size = 1 + Math.random() * 3;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.opacity = 0.2 + Math.random() * 0.5;
        particlesContainer.appendChild(p);
      }
    })();
  </script>

  function initClickToReveal() {
    const loader = document.getElementById('loaderWrap');
    const mainContent = document.getElementById('mainContent');

    if (!loader || !mainContent) return;

    loader.addEventListener('click', function() {
      if (isRevealed) return;
      isRevealed = true;

      loader.classList.add('hidden');
      
      setTimeout(() => {
        mainContent.classList.add('revealed');
        initParticles(); 
      }, 300);
    });
  }

  // ═══════════════════════════════════════════════
  // BACKGROUND PARTICLES (Canvas)
  // ═══════════════════════════════════════════════
  function initParticles() {
    const canvas = document.getElementById('particlesCanvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;
    let isActive = true;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
      constructor() { this.reset(); }
      
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.speedY = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.life = Math.random() * 100 + 100;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life--;
        if (this.life <= 0 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
          this.reset();
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.fill();
      }
    }

    const particleCount = Math.min(50, Math.floor((canvas.width * canvas.height) / 25000));
    for (let i = 0; i < particleCount; i++) particles.push(new Particle());

    function animate() {
      if (!isActive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => { p.update(); p.draw(); });

      // Conexiones entre partículas
      particles.forEach((p1, i) => {
        particles.slice(i + 1).forEach(p2 => {
          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(255, 255, 255, ${0.08 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        });
      });

      animationId = requestAnimationFrame(animate);
    }

    animate();

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        isActive = false;
        cancelAnimationFrame(animationId);
      } else {
        isActive = true;
        animate();
      }
    });
  }

  // ═══════════════════════════════════════════════
  // COUNTRY SWITCHER
  // ═══════════════════════════════════════════════
  function initCountrySwitcher() {
    document.querySelectorAll('.country-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const country = btn.dataset.country;
        if (country === currentCountry) return;
        switchCountry(country, btn);
      });
    });
  }

  function switchCountry(country, btnElement) {
    const config = CONFIG.countries[country];
    const prevConfig = CONFIG.countries[currentCountry];
    
    document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');
    document.body.setAttribute('data-country', country);

    const line = document.getElementById('countryLine');
    if (line) line.style.background = config.color;

    // Cambiar fondos
    const oldBg = document.getElementById(`bg-${currentCountry.toLowerCase()}`);
    const newBg = document.getElementById(`bg-${country.toLowerCase()}`);
    if (oldBg) {
      oldBg.classList.remove('active');
      oldBg.classList.add('inactive');
    }
    if (newBg) {
      newBg.classList.remove('inactive');
      newBg.classList.add('active');
    }

    // Actualizar orbs
    document.querySelectorAll('.orb').forEach((orb, i) => {
      const colors = [config.color, prevConfig.color, config.color];
      orb.style.background = colors[i] || config.color;
    });

    // Toast de bienvenida
    Swal.fire({
      title: `Bienvenido a DIM-ONE ${config.name}`,
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 3000,
      timerProgressBar: true,
      icon: 'success',
      background: config.toast.bg,
      color: config.toast.text,
      customClass: { popup: 'country-toast', timerProgressBar: 'country-progress' },
      didOpen: (toast) => {
        const bar = toast.querySelector('.swal2-timer-progress-bar');
        if (bar) bar.style.background = config.toast.progress;
      }
    });

    currentCountry = country;
  }

  // ═══════════════════════════════════════════════
  // PASSWORD TOGGLE
  // ═══════════════════════════════════════════════
  function initPasswordToggle() {
    const toggle = document.getElementById('togglePassword');
    const input = document.getElementById('password');
    const icon = document.getElementById('toggleIcon');

    if (!toggle || !input || !icon) return;

    toggle.addEventListener('click', () => {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      icon.className = isPassword ? 'mdi mdi-eye' : 'mdi mdi-eye-off';
      toggle.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });
  }

  // ═══════════════════════════════════════════════
  // FORM SUBMISSION
  // ═══════════════════════════════════════════════
  function initForm() {
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('btnSubmit');
    const userInput = document.getElementById('username');
    const passInput = document.getElementById('password');

    if (!form || !btn || !userInput || !passInput) return;

    // Efecto ripple en el botón
    btn.addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = userInput.value.trim();
      const pass = passInput.value.trim();
      let hasError = false;

      document.querySelectorAll('.input-group-custom').forEach(g => g.classList.remove('error'));

      if (!user) { 
        document.getElementById('group-user')?.classList.add('error'); 
        hasError = true; 
      }
      if (!pass) { 
        document.getElementById('group-pass')?.classList.add('error'); 
        hasError = true; 
      }

      if (hasError) {
        Swal.fire({
          title: 'Campos requeridos',
          text: 'Por favor complete todos los campos.',
          icon: 'warning',
          confirmButtonText: 'Entendido',
          confirmButtonColor: CONFIG.countries[currentCountry].color,
          customClass: { confirmButton: 'btn rounded-pill px-4' }
        });
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      // Simulación de envío (redirige después de 1.5s)
      setTimeout(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
        window.location.href = 'Sistemas.html';
      }, 1500);
    });

    // Quitar error al escribir
    [userInput, passInput].forEach(input => {
      input.addEventListener('input', () => {
        input.closest('.input-group-custom')?.classList.remove('error');
      });
    });
  }

  // ═══════════════════════════════════════════════
  // TILT EFFECT (Desktop)
  // ═══════════════════════════════════════════════
  function initTiltEffect() {
    if (window.matchMedia('(pointer: coarse)').matches) return;
    
    const card = document.getElementById('loginCard');
    if (!card) return;
    
    let rafId = null;

    card.addEventListener('mousemove', (e) => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const rotateX = (y - rect.height / 2) / rect.height * -6;
        const rotateY = (x - rect.width / 2) / rect.width * 6;
        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      });
    });

    card.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
      card.style.transition = 'transform 0.5s ease';
      setTimeout(() => { card.style.transition = ''; }, 500);
    });
  }

  // ═══════════════════════════════════════════════
  // ESTILOS ADICIONALES (toasts)
  // ═══════════════════════════════════════════════
  function injectStyles() {
    const style = document.createElement('style');
    style.textContent = `
      .country-toast {
        border-radius: 16px !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2) !important;
      }
      .country-toast .swal2-title {
        font-family: 'Outfit', sans-serif !important;
      }
      .country-progress {
        height: 4px !important;
        border-radius: 0 0 16px 16px !important;
      }
    `;  
    document.head.appendChild(style);
  }

  // ═══════════════════════════════════════════════
  // INICIALIZACIÓN
  // ═══════════════════════════════════════════════
  function init() {
    injectStyles();
    initClickToReveal();
    initCountrySwitcher();
    initPasswordToggle();
    initForm();
    initTiltEffect();
  }

  // Arrancar cuando el DOM esté listo
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})(); // Cierre del IIFE principal
</script>
</body>
